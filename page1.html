<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Тест СИЗ</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="page1.css" />

</head>

<body>
  <!-- менюшка слева -->
  <nav class="side-menu" id="sideMenu">
    <div class="side-menu__header">Меню</div>
    <a href="index.html" class="side-menu__item side-menu__item--active">Главная</a>
    <a href="page1.html" class="side-menu__item">Пройти тест</a>
    <a href="page2.html" class="side-menu__item">Нормативная документация</a>
    <a href="#" class="side-menu__item">Контакты</a>

    <div class="side-menu__footer">
      © 2025<br />
      ПрофЗдоровье
    </div>
  </nav>

  <div class="page">
    <!-- верх -->
    <div class="top-row">
      <div class="burger" id="burger">
        <span></span><span></span><span></span>
      </div>

      <div class="site-title">Твое профессиональное здоровье РФ</div>
    </div>

    <div class="divider"></div>

    <!-- контент страницы -->
    <div class="test-page">
      <h1 class="test-title">Подбор средств индивидуальной защиты</h1>

      <!-- PrimeVue-like select: dropdown со всем списком + поиск внутри -->
      <label class="test-label">Выберите профессию:</label>

      <div class="pselect" id="professionPicker">
        <button
          type="button"
          class="pselect__control"
          id="pselectControl"
          aria-haspopup="listbox"
          aria-expanded="false"
        >
          <span class="pselect__value" id="pselectValue">-- Выберите профессию --</span>
          <span class="pselect__chev">▾</span>
        </button>

        <div class="pselect__panel" id="pselectPanel" style="display: none;">
          <div class="pselect__search">
            <input
              type="text"
              id="professionSearch"
              class="pselect__searchInput"
              placeholder="Поиск по коду или названию…"
              autocomplete="off"
            />
          </div>

          <div class="pselect__list" id="pselectList" role="listbox"></div>
        </div>

        <!-- select оставляем (скрытый): в нем хранится выбранный код, чтобы не ломать логику -->
        <select id="professionSelect" class="test-select" style="display: none;">
          <option value="">-- Выберите --</option>
        </select>

        <div class="profession-picker__hint">
          Например: <span class="chip">100003</span> или <span class="chip">механик</span>
        </div>
      </div>

      <div id="profInfo" class="prof-info">
        <p class="prof-text">
          Выберите профессию, и мы покажем обязательные СИЗ согласно закону.
        </p>
      </div>

      <form id="testForm" class="test-form" style="display: none;">
        <h2 class="test-subtitle">Отметьте имеющиеся СИЗ:</h2>
        <div id="sizList" class="siz-list"></div>

        <button type="submit" class="hero-button">
          Отправить
        </button>
      </form>
    </div>
  </div>

  <!-- 💾 Данные -->
  <script src="professions.js"></script>
  <script src="siz/siz_3.js"></script>
  <script src="siz/siz_2.js"></script>
  <script src="siz/siz_1.js"></script>

  <!-- ⚙️ Логика -->
  <script src="page1.js"></script>
</body>
</html>
