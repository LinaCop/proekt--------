<script>
// Добавляем функциональность поиска
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('professionSearch');
    const professionSelect = document.getElementById('professionSelect');
    
    // Функция для фильтрации профессий
    function filterProfessions(searchText) {
        const options = professionSelect.options;
        searchText = searchText.toLowerCase();
        
        for (let i = 0; i < options.length; i++) {
            const option = options[i];
            const text = option.textContent.toLowerCase();
            
            if (option.value === "") {
                option.style.display = ""; // Всегда показывать опцию "-- Выберите --"
                continue;
            }
            
            if (text.includes(searchText)) {
                option.style.display = "";
            } else {
                option.style.display = "none";
            }
        }
    }
    
    // Обработчик ввода в поисковую строку
    searchInput.addEventListener('input', function() {
        filterProfessions(this.value);
    });
    
    // Обработчик изменения выбора в select
    professionSelect.addEventListener('change', function() {
        // Можно также очищать поиск при выборе профессии, если нужно:
        // searchInput.value = '';
        // filterProfessions('');
    });
});
</script>
